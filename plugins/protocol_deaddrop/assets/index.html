<!DOCTYPE html>
<html lang="en">
 <head>
  <title>LWS Example</title>
  <meta charset=utf-8 http-equiv="Content-Language" content="en"/>
  <link rel="stylesheet" type="text/css" href="deaddrop.css"/>
  <script src="deaddrop.js"></script>
  <script src="lws-login.js"></script>
 </head>
 <body>
	<div class="container">
	 <div class="title"><img src="/docrepo.svg"><div id="user-info" class="user-info"></div><img src="/deaddrop-title.png"></div>
	<div class="uplbox">
		<table id="ddrop">
			<tr>
				<th scope="col" id="th-drag">Drag and drop files</th>
				<th scope="col" id="th-paste">Paste text to upload:</th>
			</tr>
			<tr>
				<td rowspan="3">
					<div id="da" class="da"><img class="disa" src="drop.svg"></div>
				</td>
				<td>
					<form name="textupload" action="upload" method="post" enctype="multipart/form-data">
						<textarea id="text_content" class="dd-textarea" placeholder="Paste content here" aria-label="Paste content to upload"></textarea>
						<br>
						<input id="upl_text" type="submit" value="Upload Text" class="ubtn" disabled>
					</form>
				</td>
			</tr>
			<tr>
				<th scope="col" id="th-select">... or select files to upload</th>
			</tr>
			<tr>
				<td>
					<span id="size"></span><br>
					<form name="multipart" action="upload" method="post" enctype="multipart/form-data">
						<input multiple type="file" name="file" id="file" size="20" aria-label="Select files to upload">
						<span id="file_info" class="dd-fileinfo"></span>
						<br>
						<input id="upl" type="submit" name="Upload" value="Upload" class="ubtn" disabled>
					</form>
				</td>
			</tr>
			<tr>
				<td colspan="2">
					<table id="ongoing" class="nb">
						<thead>
							<tr class="sr-only">
								<th scope="col">Status</th>
								<th scope="col">Size</th>
								<th scope="col">Filename</th>
							</tr>
						</thead>
						<tbody id="ongoing-tbody"></tbody>
					</table>
				</td>
			</tr>
			<tr>
				<td colspan="2">
					<div id="dd-list" class="dd-list">
						<table class="nb">
							<thead>
								<tr class="sr-only">
									<th scope="col">Size</th>
									<th scope="col">Modified</th>
									<th scope="col">Actions</th>
									<th scope="col">Filename</th>
								</tr>
							</thead>
							<tbody id="files-tbody"></tbody>
						</table>
					</div>
					<div id="connected-users-list" class="connected-users">
						<table class="nb">
							<thead>
								<tr>
									<th scope="col">User</th>
									<th scope="col">IP Address</th>
									<th scope="col">Platform</th>
									<th scope="col">Client</th>
								</tr>
							</thead>
							<tbody id="users-tbody"></tbody>
						</table>
					</div>
				</td>
			</tr>
		</table>
	</div>
	</div>
 </body>
</html>
