<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DNSSEC Monitor</title>
    <!-- Strict CSP prevents inline styles, and using external font CDNs without explicit whitelist, so we use system fonts -->
    <link rel="stylesheet" href="monitor.css">
    <script src="lws-login.js"></script>
</head>
<body>
    <div id="reconnect-overlay" class="reconnect-overlay">
        <div class="reconnect-box">
            <div class="spinner"></div>
            <h2>Reconnecting...</h2>
            <p>Connection to DNSSEC Monitor lost.</p>
        </div>
    </div>
    <div class="app-container">
        <header>
            <div class="header-content">
                <h1>DNSSEC Monitor</h1>
                <p>Manage DNSSEC and TLS</p>
            </div>
            <div class="header-status">
                <div id="user-info" class="user-info"></div>
                <div id="extip-status" class="extip-container"></div>
                <div class="extip-override-box">
                    <label for="input-ipv6-suffix" class="extip-label">IPv6 Suffix:</label>
                    <input type="text" id="input-ipv6-suffix" placeholder="" class="extip-input" maxlength="4">
                    <button id="btn-save-suffix" class="btn secondary btn-extip">Apply</button>
                </div>
                <span id="ws-status" class="status-badge connecting hide"></span>
            </div>
        </header>

        <main>
            <section class="panel domain-panel" id="domain-panel">
                <div class="panel-header">
                    <h2>Domains</h2>
                    <button id="btn-add-domain" class="btn primary">Add Domain</button>
                </div>
                <div class="table-container">
                    <table id="table-domains">
                        <thead>
                            <tr>
                                <th>Domain Name</th>
                                <th>Expiry</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr><td colspan="3" class="loading">Loading...</td></tr>
                        </tbody>
                    </table>
                </div>
            </section>

            <section class="panel detail-panel hidden-panel" id="detail-panel">
                <div class="panel-header">
                    <h2 id="detail-title">Zone Records:<br><span>---</span></h2>
                    <div id="whois-header" class="whois-header"></div>
                    <div class="actions-group">
                        <button id="btn-back-domains" class="btn secondary">&larr; Back</button>
                        <button id="btn-save-zonefile" class="btn primary">Save Zonefile</button>
                    </div>
                </div>

                <div id="whois-header" class="whois-header-panel">
                    <!-- Populated by JS -->
                </div>

                <div class="ext-raw-editor">
                    <label for="raw-zone-editor">Raw Zone File</label>
                    <textarea id="raw-zone-editor" spellcheck="false" placeholder="; Raw zone file contents..."></textarea>
                </div>

                <div class="table-container">
                    <table id="table-zone">
                        <thead>
                            <tr>
                                <th>Name</th>
                                <th>TTL</th>
                                <th>Type</th>
                                <th>Value</th>
                                <th>TLS Port</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody>
                            <!-- Populated dynamically -->
                            <tr><td colspan="5" class="loading">Loading...</td></tr>
                        </tbody>
                    </table>
                    <button id="btn-add-record" class="btn secondary ext-add-record">+ Add Record</button>
                </div>

                <div id="record-editor" class="hidden-panel ext-editor">
                    <h3 id="editor-title" class="ext-title">Edit Record</h3>
                    <div id="editor-form" class="ext-form-box"></div>
                    <div class="ext-actions">
                        <button id="btn-cancel-edit" class="btn hollow">Discard</button>
                        <button id="btn-apply-record" class="btn primary">Apply Changes</button>
                    </div>
                </div>
            </section>
        </main>
    </div>

    <!-- Modals -->
    <!-- Modals for legacy TLS endpoints remain here hidden/inactive -->

    <div id="modal-new-domain" class="modal">
        <div class="modal-content">
            <h3>Add New Domain</h3>
            <div class="form-group">
                <label for="input-new-domain">Domain Name</label>
                <input type="text" id="input-new-domain" placeholder="example.com">
            </div>
            <div class="modal-actions">
                <button id="btn-nd-cancel" class="btn hollow">Cancel</button>
                <button id="btn-nd-save" class="btn primary" disabled>Create</button>
            </div>
        </div>
    </div>

    <div id="modal-new-tls" class="modal">
        <div class="modal-content">
            <h3>Add TLS Subdomain for <span id="tls-domain-name"></span></h3>
            <div class="form-group">
                <label for="input-tls-subdomain">Subdomain (FQDN)<span class="req">*</span></label>
                <input type="text" id="input-tls-subdomain" placeholder="www.example.com">
            </div>
            <div class="form-group">
                <label for="input-tls-email">Account Email<span class="req">*</span></label>
                <input type="email" id="input-tls-email" placeholder="admin@example.com">
            </div>
            <div class="form-group">
                <label for="input-tls-org">Organization<span class="req">*</span></label>
                <input type="text" id="input-tls-org" placeholder="My Organization">
            </div>
            <div class="form-group">
                <label for="input-tls-dir">ACME Directory URL<span class="req">*</span></label>
                <input type="text" id="input-tls-dir" placeholder="https://acme-v02.../directory" value="https://acme-v02.api.letsencrypt.org/directory">
            </div>
            <div class="modal-actions">
                <button id="btn-nt-cancel" class="btn hollow">Cancel</button>
                <button id="btn-nt-save" class="btn primary" disabled>Create TLS</button>
            </div>
        </div>
    </div>

    <!-- Notification Toast -->
    <div id="toast" class="toast"></div>

    <script src="monitor.js?v=2"></script>
</body>
</html>
